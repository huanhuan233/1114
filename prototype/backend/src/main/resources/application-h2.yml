# 无 MySQL 时可用：H2 内存库，便于本地跑通前后端
server:
  port: 8055
  address: 0.0.0.0
spring:
  datasource:
    url: jdbc:h2:mem:process_agent;DB_CLOSE_DELAY=-1;MODE=MySQL;INIT=CREATE SCHEMA IF NOT EXISTS PUBLIC
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
