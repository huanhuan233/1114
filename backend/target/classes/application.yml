server:
  port: 8055
  address: 0.0.0.0

spring:
  application:
    name: process-agent-backend
  datasource:
    url: jdbc:mysql://localhost:3306/process_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
